<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to Career-Ops — your autonomous AI job agent." />
  <title>Sign In — Career-Ops</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slate: { 950: '#0a0f1a', 900: '#0f1729' },
            electric: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', glow: '#22d3ee' },
          },
          fontFamily: {
            display: ['"Instrument Sans"', 'system-ui', 'sans-serif'],
            body: ['"DM Sans"', 'system-ui', 'sans-serif'],
          },
          boxShadow: { glow: '0 0 40px -8px rgba(14, 165, 233, 0.45)' },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    h1, h2, .font-display { font-family: 'Instrument Sans', system-ui, sans-serif; }
    .grid-bg {
      background-image:
        linear-gradient(rgba(14, 165, 233, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(14, 165, 233, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .hero-glow {
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(14, 165, 233, 0.18), transparent);
    }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-300 antialiased">

  <div class="relative flex min-h-screen flex-col">
    <div class="hero-glow pointer-events-none absolute inset-0"></div>
    <div class="grid-bg pointer-events-none absolute inset-0 opacity-50"></div>

    <!-- Header -->
    <header class="relative z-10 border-b border-white/5 bg-slate-950/80 backdrop-blur-xl">
      <nav class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
        <a href="index.html" class="flex items-center gap-2.5 font-display text-lg font-semibold tracking-tight text-white transition-all duration-300 ease-in-out hover:opacity-90">
          <span class="flex h-8 w-8 items-center justify-center rounded-lg bg-electric-500/15 ring-1 ring-electric-500/30">
            <i data-lucide="bot" class="h-4 w-4 text-electric-400"></i>
          </span>
          Career-Ops
        </a>
        <a href="index.html" class="inline-flex items-center gap-2 text-sm font-medium text-slate-400 transition-all duration-300 ease-in-out hover:text-white">
          <i data-lucide="arrow-left" class="h-4 w-4"></i>
          Back to home
        </a>
      </nav>
    </header>

    <!-- Login -->
    <main class="relative z-10 flex flex-1 items-center justify-center px-6 py-16">
      <div class="w-full max-w-md">
        <div class="mb-8 text-center">
          <span class="mb-4 inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-electric-500/15 ring-1 ring-electric-500/30">
            <i data-lucide="log-in" class="h-7 w-7 text-electric-400"></i>
          </span>
          <h1 class="font-display text-3xl font-bold text-white">Sign in</h1>
          <p class="mt-2 text-sm text-slate-400">Access your resume, pipeline, and job agent dashboard.</p>
        </div>

        <div class="rounded-2xl border border-electric-500/40 bg-slate-900/80 p-8 shadow-glow backdrop-blur-sm">
          <form id="login-form" class="space-y-5" action="#" method="post">
            <div>
              <label for="email" class="block text-sm font-medium text-slate-300">Email</label>
              <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@company.com"
                class="mt-1.5 w-full rounded-lg border border-white/10 bg-slate-950/80 px-4 py-3 text-sm text-white placeholder:text-slate-500 outline-none transition-all duration-300 ease-in-out focus:border-electric-500 focus:ring-2 focus:ring-electric-500/20" />
            </div>
            <div>
              <div class="flex items-center justify-between">
                <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
                <a href="#" class="text-xs font-medium text-electric-400 transition-all duration-300 ease-in-out hover:text-electric-glow">Forgot password?</a>
              </div>
              <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••"
                class="mt-1.5 w-full rounded-lg border border-white/10 bg-slate-950/80 px-4 py-3 text-sm text-white placeholder:text-slate-500 outline-none transition-all duration-300 ease-in-out focus:border-electric-500 focus:ring-2 focus:ring-electric-500/20" />
            </div>
            <label class="flex cursor-pointer items-center gap-2.5 text-sm text-slate-400">
              <input type="checkbox" name="remember" class="h-4 w-4 rounded border-white/20 bg-slate-950 text-electric-500 focus:ring-electric-500/30" />
              Remember me
            </label>
            <button type="submit" class="flex w-full items-center justify-center gap-2 rounded-xl bg-electric-500 py-3.5 text-sm font-semibold text-white transition-all duration-300 ease-in-out hover:bg-electric-600 hover:shadow-[0_0_50px_-8px_rgba(14,165,233,0.55)]">
              <i data-lucide="log-in" class="h-4 w-4"></i>
              Sign In
            </button>
          </form>

          <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
            <div class="relative flex justify-center text-xs uppercase tracking-widest"><span class="bg-slate-900/80 px-3 text-slate-500">or</span></div>
          </div>

          <button type="button" class="flex w-full items-center justify-center gap-2 rounded-xl border border-white/10 bg-slate-950/60 py-3 text-sm font-medium text-white transition-all duration-300 ease-in-out hover:border-electric-500/30 hover:bg-white/5">
            <i data-lucide="github" class="h-4 w-4"></i>
            Continue with GitHub
          </button>

          <p class="mt-6 text-center text-sm text-slate-500">
            Don't have an account?
            <a href="index.html#pricing" class="font-medium text-electric-400 transition-all duration-300 ease-in-out hover:text-electric-glow">View plans</a>
          </p>
        </div>
      </div>
    </main>

    <footer class="relative z-10 border-t border-white/5 py-6 text-center text-xs text-slate-500">
      &copy; 2026 Career-Ops. Open-source AI job search automation.
    </footer>
  </div>

  <script>
    lucide.createIcons();
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      // Placeholder — wire to your auth backend
    });
  </script>
</body>
</html>
